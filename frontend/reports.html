<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCRM — Reports</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-mark">N</span><span class="logo-text">NexCRM</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="contacts.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Contacts</span></a>
      <a href="deals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Deals</span></a>
      <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tasks</span></a>
      <a href="emails.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>Emails</span></a>
      <a href="notes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><span>Notes</span></a>
      <a href="reports.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a>
    </nav>
    <div class="sidebar-footer"><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg><span>Settings</span></a></div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">Reports & Analytics</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search..." id="globalSearch" onkeyup="globalSearch(this.value)"></div>
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>
    </header>
    <div class="page-body" id="reportsBody"></div>
  </main>
</div>
<div class="search-results" id="searchResults"></div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
async function renderReports() {
  const contacts = await DB.getContacts();
  const deals = await DB.getDeals();
  const tasks = await DB.getTasks();
  const emails = await DB.getEmails();

  const won = deals.filter(d => d.stage === 'Won');
  const lost = deals.filter(d => d.stage === 'Lost');
  const active = deals.filter(d => d.stage !== 'Won' && d.stage !== 'Lost');
  const wonVal = won.reduce((s,d) => s + parseFloat(d.value||0), 0);
  const pipelineVal = active.reduce((s,d) => s + parseFloat(d.value||0), 0);
  const weightedVal = active.reduce((s,d) => s + parseFloat(d.value||0) * (parseFloat(d.probability||0)/100), 0);
  const winRate = (won.length + lost.length) > 0 ? Math.round(won.length / (won.length + lost.length) * 100) : 0;
  const avgDealSize = won.length > 0 ? wonVal / won.length : 0;

  // Contact sources
  const sources = {};
  contacts.forEach(c => { const s = c.source || 'Unknown'; sources[s] = (sources[s]||0) + 1; });
  const maxSource = Math.max(...Object.values(sources), 1);

  // Deal stages
  const STAGES = ['Lead','Meeting','Proposal','Negotiation','Won','Lost'];
  const stageCounts = {}, stageVals = {};
  STAGES.forEach(s => { stageCounts[s] = 0; stageVals[s] = 0; });
  deals.forEach(d => { if (stageCounts[d.stage] !== undefined) { stageCounts[d.stage]++; stageVals[d.stage] += parseFloat(d.value||0); } });
  const maxStageVal = Math.max(...Object.values(stageVals), 1);

  // Contact statuses
  const statuses = { Customer: 0, Lead: 0, Prospect: 0, Partner: 0, Inactive: 0 };
  contacts.forEach(c => { if (statuses[c.status||'Lead'] !== undefined) statuses[c.status||'Lead']++; });
  const maxStatus = Math.max(...Object.values(statuses), 1);

  document.getElementById('reportsBody').innerHTML = `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">
      ${[
        { label: 'Total Contacts', value: contacts.length, color: 'var(--accent)' },
        { label: 'Pipeline Value', value: formatMoney(pipelineVal), color: 'var(--purple)' },
        { label: 'Weighted Pipeline', value: formatMoney(weightedVal), color: 'var(--accent)' },
        { label: 'Won Revenue', value: formatMoney(wonVal), color: 'var(--green)' },
        { label: 'Win Rate', value: winRate + '%', color: winRate > 50 ? 'var(--green)' : 'var(--yellow)' },
        { label: 'Avg Deal Size', value: formatMoney(avgDealSize), color: 'var(--text)' },
        { label: 'Open Tasks', value: tasks.filter(t=>!t.done).length, color: 'var(--yellow)' },
        { label: 'Emails Sent', value: emails.length, color: 'var(--accent)' },
      ].map(m => `<div class="report-metric">
        <div class="report-metric-value" style="color:${m.color};font-family:var(--mono)">${m.value}</div>
        <div class="report-metric-label">${m.label}</div>
      </div>`).join('')}
    </div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <div class="card-header"><h2>Pipeline by Stage</h2></div>
        <div class="bar-chart">
          ${STAGES.map(s => `
            <div class="bar-row">
              <div class="bar-row-label">${s}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${stageVals[s]>0?Math.max((stageVals[s]/maxStageVal)*100,4):0}%;background:${STAGE_COLORS[s]||'#999'}">
                  ${stageVals[s] > 0 ? `<span>${formatMoney(stageVals[s])}</span>` : ''}
                </div>
              </div>
              <div class="bar-row-val">${stageCounts[s]}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Contact Breakdown</h2></div>
        <div class="bar-chart">
          ${Object.entries(statuses).map(([s, v]) => `
            <div class="bar-row">
              <div class="bar-row-label">${s}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${v>0?Math.max((v/maxStatus)*100,4):0}%;background:var(--accent)">
                  ${v > 0 ? `<span>${v}</span>` : ''}
                </div>
              </div>
              <div class="bar-row-val">${v}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <div class="card-header"><h2>Lead Sources</h2></div>
        <div class="bar-chart">
          ${Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([s,v]) => `
            <div class="bar-row">
              <div class="bar-row-label" style="font-size:12px">${s}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.max((v/maxSource)*100,4)}%;background:var(--purple)"><span>${v}</span></div>
              </div>
              <div class="bar-row-val">${v}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>Task Overview</h2></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          ${[
            { l: 'Open', v: tasks.filter(t=>!t.done).length, c: 'var(--accent)' },
            { l: 'Completed', v: tasks.filter(t=>t.done).length, c: 'var(--green)' },
            { l: 'High Priority', v: tasks.filter(t=>!t.done&&t.priority==='High').length, c: 'var(--red)' },
            { l: 'Overdue', v: tasks.filter(t=>!t.done&&t.dueDate&&new Date(t.dueDate+'T00:00:00')<new Date()).length, c: 'var(--yellow)' },
          ].map(m=>`<div style="text-align:center;padding:12px;background:var(--bg);border-radius:var(--radius-sm)">
            <div style="font-size:24px;font-weight:600;color:${m.c};font-family:var(--mono)">${m.v}</div>
            <div style="font-size:11.5px;color:var(--text-3);margin-top:3px">${m.l}</div>
          </div>`).join('')}
        </div>
        <div class="card-header" style="margin-bottom:10px"><h2>Recent Deals Won</h2></div>
        ${won.slice(0,4).map(d => `
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:13.5px">
            <span>${d.title}</span>
            <span style="font-weight:600;color:var(--green);font-family:var(--mono)">${formatMoney(d.value)}</span>
          </div>
        `).join('') || '<p style="color:var(--text-3);font-size:13px">No deals won yet.</p>'}
      </div>
    </div>
  `;
}

renderReports();
</script>
</body>
</html>
