<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCRM — Tasks</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-mark">N</span><span class="logo-text">NexCRM</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="contacts.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Contacts</span></a>
      <a href="deals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Deals</span></a>
      <a href="tasks.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tasks</span></a>
      <a href="emails.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>Emails</span></a>
      <a href="notes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><span>Notes</span></a>
      <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a>
    </nav>
    <div class="sidebar-footer"><a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg><span>Settings</span></a></div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">Tasks</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search anything..." id="globalSearch" onkeyup="globalSearch(this.value)"></div>
        <button class="btn-primary" onclick="openAddTask()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Task</button>
      </div>
    </header>
    <div class="page-body">
      <div id="taskStats" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap"></div>
      <div class="page-toolbar">
        <div class="toolbar-left">
          <input type="text" class="filter-input" placeholder="Filter tasks..." id="taskFilter" oninput="renderTasks()">
          <select id="taskStatusFilter" onchange="renderTasks()" style="width:130px;padding:7px 30px 7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13.5px">
            <option value="open">Open Tasks</option>
            <option value="done">Completed</option>
            <option value="">All Tasks</option>
          </select>
          <select id="taskPriorityFilter" onchange="renderTasks()" style="width:120px;padding:7px 30px 7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13.5px">
            <option value="">All Priority</option>
            <option>High</option><option>Medium</option><option>Low</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn-secondary" onclick="clearDone()" style="font-size:13px">Clear Completed</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th style="width:32px"></th><th>Task</th><th>Contact</th><th>Priority</th><th>Due Date</th><th>Created</th><th></th></tr></thead>
          <tbody id="tasksTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="taskModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="taskModalTitle">Add Task</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label>Task Title *</label><input type="text" id="t_title" placeholder="Follow up with client..."></div>
    <div class="form-row">
      <div class="form-group"><label>Due Date</label><input type="date" id="t_due"></div>
      <div class="form-group"><label>Priority</label>
        <select id="t_priority"><option>High</option><option selected>Medium</option><option>Low</option></select>
      </div>
    </div>
    <div class="form-group"><label>Linked Contact</label>
      <select id="t_contact"><option value="">No contact linked</option></select>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="t_notes" placeholder="Additional details..."></textarea></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="search-results" id="searchResults"></div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
