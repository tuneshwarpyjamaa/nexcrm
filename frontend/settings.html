<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCRM — Settings</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-mark">N</span><span class="logo-text">NexCRM</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="contacts.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Contacts</span></a>
      <a href="deals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Deals</span></a>
      <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tasks</span></a>
      <a href="emails.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>Emails</span></a>
      <a href="notes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg><span>Notes</span></a>
      <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a>
    </nav>
    <div class="sidebar-footer"><a href="settings.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg><span>Settings</span></a></div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">Settings</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search..." id="globalSearch" onkeyup="globalSearch(this.value)"></div>
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>
    </header>
    <div class="page-body">
      <div style="display:flex;gap:24px">
        <div style="flex:1;max-width:600px">

        <!-- Business Info -->
        <div class="card" style="margin-bottom:16px" id="profileCard">
          <div class="card-header"><h2>Profile & Preferences</h2></div>
          <div class="form-group"><label>Business Name</label><input type="text" id="s_bizName" placeholder="My Company Inc."></div>
          <div class="form-group"><label>Your Name</label><input type="text" id="s_userName" placeholder="Your name"></div>
          <div class="form-group"><label>Email</label><input type="email" id="s_email" placeholder="you@company.com"></div>
          <div class="form-row">
            <div class="form-group"><label>Currency Symbol</label><input type="text" id="s_currency" placeholder="₹" maxlength="3"></div>
            <div class="form-group"><label>Fiscal Year Start</label>
              <select id="s_fyStart"><option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option></select>
            </div>
          </div>
          <button id="saveBtn" class="btn-primary" onclick="saveSettings()">Save Settings</button>
        </div>

        <!-- Data Stats -->
        <div class="card" style="margin-bottom:16px">
          <div class="card-header"><h2>Your Data</h2></div>
          <div id="dataStats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-secondary" onclick="exportAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export All Data (JSON)</button>
            <label class="btn-primary" style="cursor:pointer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8.5 12,3.5 7,8.5"/><line x1="12" y1="3.5" x2="12" y2="15.5"/></svg> Import Backup
              <input type="file" accept=".json" style="display:none" onchange="importBackup(this)">
            </label>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="card" style="border-color:#fecaca">
          <div class="card-header"><h2 style="color:var(--red)">⚠️ Danger Zone</h2></div>
          <p style="font-size:13.5px;color:var(--text-2);margin-bottom:14px">These actions are permanent and cannot be undone.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn-danger" onclick="clearData('contacts')">Clear All Contacts</button>
            <button class="btn-danger" onclick="clearData('deals')">Clear All Deals</button>
            <button class="btn-danger" onclick="clearData('tasks')">Clear All Tasks</button>
            <button class="btn-danger" onclick="clearData('all')" style="background:var(--red);color:#fff;border-color:var(--red)">🗑️ Clear Everything</button>
          </div>
        </div>

      </div>
        <div style="width:280px">
          <div class="card">
            <div class="card-header"><h2>Account Summary</h2></div>
            <div id="summaryContent"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="search-results" id="searchResults"></div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
async function loadSettings() {
  const s = await DB.getSettings();
  document.getElementById('s_bizName').value = s.bizName || '';
  document.getElementById('s_userName').value = s.userName || '';
  document.getElementById('s_email').value = s.email || '';
  document.getElementById('s_currency').value = s.currency || '₹';
  document.getElementById('s_fyStart').value = s.fyStart || 'April';

  document.getElementById('summaryContent').innerHTML = `
    <div style="margin-bottom:8px"><strong>Name:</strong> ${s.userName || '<span style="color:var(--text-3)">—</span>'}</div>
    <div style="margin-bottom:8px"><strong>Email:</strong> ${s.email || '<span style="color:var(--text-3)">—</span>'}</div>
    <div style="margin-bottom:8px"><strong>Business:</strong> ${s.bizName || '<span style="color:var(--text-3)">—</span>'}</div>
    <div style="margin-bottom:8px"><strong>Version:</strong> v1.0</div>
    <div><strong>Plan:</strong> Free</div>
    <div style="margin-top:12px"><a href="#" onclick="document.getElementById('profileCard').scrollIntoView({behavior:'smooth'}); document.getElementById('s_bizName').focus();" style="color:var(--accent);font-size:12px;text-decoration:none">Complete your profile →</a></div>
  `;

  const contacts = await DB.getContacts();
  const deals = await DB.getDeals();
  const tasks = await DB.getTasks();
  const notes = await DB.getNotes();
  const emails = await DB.getEmails();
  const c = contacts.length, d = deals.length, t = tasks.length;
  const n = notes.length, e = emails.length;
  document.getElementById('dataStats').innerHTML = [
    { l: 'Contacts', v: c, icon: '👤', bg: 'rgba(59, 130, 246, 0.1)' }, 
    { l: 'Deals', v: d, icon: '💼', bg: 'rgba(34, 197, 94, 0.1)' }, 
    { l: 'Tasks', v: t, icon: '✅', bg: 'rgba(234, 179, 8, 0.1)' }, 
    { l: 'Notes', v: n, icon: '📝', bg: 'rgba(147, 51, 234, 0.1)' }, 
    { l: 'Emails', v: e, icon: '✉️', bg: 'rgba(249, 115, 22, 0.1)' },
    { l: 'Storage Used', v: (JSON.stringify(localStorage).length / 1024).toFixed(1) + ' KB', icon: '💾', bg: 'rgba(156, 163, 175, 0.1)' },
  ].map(m => `<div style="text-align:center;padding:12px;background:${m.bg};border-radius:var(--radius-sm)">
    <div style="font-size:24px;margin-bottom:4px">${m.icon}</div>
    <div style="font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent)">${m.v}</div>
    <div style="font-size:11.5px;color:var(--text-3);margin-top:2px">${m.l}</div>
  </div>`).join('');
}

function saveSettings() {
  DB.saveSettings({
    bizName: document.getElementById('s_bizName').value.trim(),
    userName: document.getElementById('s_userName').value.trim(),
    email: document.getElementById('s_email').value.trim(),
    currency: document.getElementById('s_currency').value.trim() || '₹',
    fyStart: document.getElementById('s_fyStart').value,
  });
  toast('Settings saved', 'success');
  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '✓ Saved!';
  setTimeout(() => btn.innerHTML = 'Save Settings', 2000);
}

function exportAll() {
  const data = {
    contacts: DB.getContacts(),
    deals: DB.getDeals(),
    tasks: DB.getTasks(),
    notes: DB.getNotes(),
    emails: DB.getEmails(),
    settings: DB.getSettings(),
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'nexcrm-backup-' + new Date().toISOString().split('T')[0] + '.json'; a.click();
  toast('Backup exported');
}

function importBackup(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('This will OVERWRITE your current data. Continue?')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.contacts) DB.saveContacts(data.contacts);
      if (data.deals) DB.saveDeals(data.deals);
      if (data.tasks) DB.saveTasks(data.tasks);
      if (data.notes) DB.saveNotes(data.notes);
      if (data.emails) DB.saveEmails(data.emails);
      if (data.settings) DB.saveSettings(data.settings);
      toast('Backup restored!', 'success');
      loadSettings();
    } catch (err) {
      toast('Invalid backup file', 'error');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function clearData(type) {
  const label = type === 'all' ? 'ALL data' : `all ${type}`;
  if (!confirm(`Are you sure you want to delete ${label}? This cannot be undone.`)) return;
  if (type === 'contacts' || type === 'all') DB.saveContacts([]);
  if (type === 'deals' || type === 'all') DB.saveDeals([]);
  if (type === 'tasks' || type === 'all') DB.saveTasks([]);
  if (type === 'all') { DB.saveNotes([]); DB.saveEmails([]); localStorage.removeItem('crm_activity'); }
  toast(`Cleared ${label}`, 'success');
  loadSettings();
}

loadSettings();
</script>
</body>
</html>
