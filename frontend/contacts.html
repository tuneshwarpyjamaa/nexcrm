<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCRM — Contacts</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">N</span>
      <span class="logo-text">NexCRM</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="contacts.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Contacts</span></a>
      <a href="deals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Deals</span></a>
      <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Tasks</span></a>
      <a href="emails.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>Emails</span></a>
      <a href="notes.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Notes</span></a>
      <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reports</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg><span>Settings</span></a>
    </div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">Contacts</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search anything..." id="globalSearch" onkeyup="globalSearch(this.value)">
        </div>
        <button class="btn-secondary" onclick="logout()">Logout</button>
        <button class="btn-primary" onclick="openAddContact()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Contact
        </button>
      </div>
    </header>
    <div class="page-body">
      <div class="page-toolbar">
        <div class="toolbar-left">
          <input type="text" class="filter-input" placeholder="Filter contacts..." id="filterInput" oninput="renderContacts()">
          <select id="statusFilter" onchange="renderContacts()" style="width:130px;padding:7px 30px 7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13.5px">
            <option value="">All Statuses</option>
            <option>Lead</option><option>Prospect</option><option>Customer</option><option>Inactive</option><option>Partner</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn-secondary" onclick="exportContacts()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <label class="btn-secondary" style="cursor:pointer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import
            <input type="file" accept=".csv" style="display:none" onchange="importContacts(this)">
          </label>
          <span id="contactCount" style="font-size:13px;color:var(--text-3)"></span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Company</th><th>Email</th><th>Phone</th><th>Status</th><th>Tags</th><th>Added</th><th></th>
            </tr>
          </thead>
          <tbody id="contactsTable"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Contact Modal -->
<div class="modal-overlay" id="contactModal" onclick="closeModal(event)">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="contactModalTitle">Add Contact</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Full Name *</label><input type="text" id="c_name" placeholder="Jane Smith"></div>
      <div class="form-group"><label>Company</label><input type="text" id="c_company" placeholder="Acme Corp"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="c_email" placeholder="jane@acme.com"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="c_phone" placeholder="555-0100"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Job Title</label><input type="text" id="c_title" placeholder="VP Sales"></div>
      <div class="form-group"><label>Status</label>
        <select id="c_status"><option>Lead</option><option>Prospect</option><option>Customer</option><option>Partner</option><option>Inactive</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>LinkedIn URL</label><input type="url" id="c_linkedin" placeholder="https://linkedin.com/in/..."></div>
      <div class="form-group"><label>Website</label><input type="url" id="c_website" placeholder="https://acme.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Source</label>
        <select id="c_source"><option value="">Unknown</option><option>Website</option><option>Referral</option><option>LinkedIn</option><option>Cold Outreach</option><option>Event</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Tags (comma-separated)</label><input type="text" id="c_tags" placeholder="hot, vip, partner"></div>
    </div>
    <div class="form-group"><label>Address</label><input type="text" id="c_address" placeholder="123 Main St, City, State"></div>
    <div class="form-group"><label>Notes</label><textarea id="c_notes" placeholder="Any notes about this contact..."></textarea></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveContact()">Save Contact</button>
    </div>
  </div>
</div>

<!-- Contact Detail Panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="contactDetail">
  <div class="detail-header">
    <div>
      <div id="detailAvatar"></div>
      <div class="detail-name" id="detailName"></div>
      <div style="font-size:13px;color:var(--text-3);margin-top:2px" id="detailSub"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start">
      <button class="btn-secondary" id="detailEditBtn" onclick="editCurrentContact()">Edit</button>
      <button class="btn-icon" onclick="closeDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>
  <div id="detailBody"></div>
</div>

<div class="search-results" id="searchResults"></div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/contacts.js"></script>
</body>
</html>
