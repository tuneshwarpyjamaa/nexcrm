<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexCRM — Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">N</span>
        <span class="logo-text">NexCRM</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active" data-tooltip="Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="contacts.html" class="nav-item" data-tooltip="Contacts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Contacts</span>
        </a>
        <a href="deals.html" class="nav-item" data-tooltip="Deals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span>Deals</span>
        </a>
        <a href="tasks.html" class="nav-item" data-tooltip="Tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Tasks</span>
        </a>
        <a href="emails.html" class="nav-item" data-tooltip="Emails">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>Emails</span>
        </a>
        <a href="notes.html" class="nav-item" data-tooltip="Notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
          <span>Notes</span>
        </a>
        <a href="reports.html" class="nav-item" data-tooltip="Reports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Reports</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="settings.html" class="nav-item" data-tooltip="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          <span>Settings</span>
        </a>
        <a href="#" class="nav-item sidebar-logout" onclick="logout(); return false;" data-tooltip="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search anything..." id="globalSearch" onkeyup="globalSearch(this.value)">
          </div>

          <button class="btn-primary" onclick="showQuickAdd()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Quick Add
          </button>
        </div>
      </header>

      <div class="page-body" id="dashboardPage">
        <!-- Stats Row -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- Middle Row -->
        <div class="dashboard-grid">
          <div class="card" id="recentActivity">
            <div class="card-header">
              <h2>Recent Activity</h2>
              <span class="badge" id="activityCount">0</span>
            </div>
            <div class="activity-list" id="activityList">
              <p class="empty-state">No activity yet. Start by adding contacts or deals.</p>
            </div>
          </div>

          <div class="card" id="upcomingTasks">
            <div class="card-header">
              <h2>Upcoming Tasks</h2>
              <a href="tasks.html" class="card-link">View all →</a>
            </div>
            <div class="task-list" id="dashTaskList">
              <p class="empty-state">No upcoming tasks.</p>
            </div>
          </div>

          <div class="card" id="dealsFunnel">
            <div class="card-header">
              <h2>Pipeline Overview</h2>
              <a href="deals.html" class="card-link">View all →</a>
            </div>
            <div id="pipelineChart"></div>
          </div>
        </div>

        <!-- Bottom Row -->
        <div class="dashboard-grid-2">
          <div class="card">
            <div class="card-header">
              <h2>Top Contacts</h2>
              <a href="contacts.html" class="card-link">View all →</a>
            </div>
            <div id="topContacts"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <h2>Hot Deals</h2>
              <a href="deals.html" class="card-link">View all →</a>
            </div>
            <div id="hotDeals"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Quick Add Modal -->
  <div class="modal-overlay" id="quickAddModal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>Quick Add</h3>
        <button class="modal-close" onclick="closeQuickAdd()">✕</button>
      </div>
      <div class="quick-add-grid">
        <button class="quick-add-btn" onclick="location.href='contacts.html?new=1'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          New Contact
        </button>
        <button class="quick-add-btn" onclick="location.href='deals.html?new=1'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          New Deal
        </button>
        <button class="quick-add-btn" onclick="location.href='tasks.html?new=1'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          New Task
        </button>
        <button class="quick-add-btn" onclick="location.href='notes.html?new=1'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          New Note
        </button>
      </div>
    </div>
  </div>

  <!-- Search Results Overlay -->
  <div class="search-results" id="searchResults"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
